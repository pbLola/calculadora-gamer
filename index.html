<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Calculadora Sabor Gamer</title>
  </head>
  <body>
    <div class="calculadora">
      <input class="display" placeholder="Display" />
      <button class="generic-button">AC</button>
      <button class="generic-button">/</button>
      <button class="generic-button">*</button>
      <button class="generic-button">-</button>
      <button class="generic-button">7</button
      ><button class="generic-button">8</button>
      <button class="generic-button">9</button>
      <button class="generic-button">+</button>
      <button class="generic-button">4</button>
      <button class="generic-button">5</button>
      <button class="generic-button">6</button>
      <button class="generic-button">.</button>
      <button class="generic-button">1</button>
      <button class="generic-button">2</button>
      <button class="generic-button">3</button>
      <button class="generic-button equal">=</button>
      <button class="generic-button zero">0</button>
      <button class="generic-button">.</button>
    </div>
  </body>
  <script src="script.js"></script>
</html>
